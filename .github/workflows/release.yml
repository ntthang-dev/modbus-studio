name: Draft Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag/version name for the release (e.g. v1.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-binstall
        shell: bash
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall -y flutter_rust_bridge_codegen@2.12.0

      - name: Generate FFI Bindings
        run: flutter_rust_bridge_codegen generate

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Windows App
        run: flutter build windows --release

      - name: Package Windows Release
        shell: pwsh
        run: |
          # Rename Release folder to modbus_studio to avoid extracting as "Release"
          Rename-Item -Path "build/windows/x64/runner/Release" -NewName "modbus_studio"
          Compress-Archive -Path "build/windows/x64/runner/modbus_studio" -DestinationPath "modbus_studio_windows.zip"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: modbus-studio-windows
          path: modbus_studio_windows.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS Release
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall -y flutter_rust_bridge_codegen@2.12.0

      - name: Generate FFI Bindings
        run: flutter_rust_bridge_codegen generate

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build macOS App
        run: flutter build macos --release
        env:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"


      - name: Package macOS .app Zip
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y "$GITHUB_WORKSPACE/modbus_studio_mac.zip" modbus_studio.app


      - name: Package macOS .dmg
        run: |
          mkdir dmg_root
          ditto build/macos/Build/Products/Release/modbus_studio.app dmg_root/modbus_studio.app
          ln -s /Applications dmg_root/Applications
          hdiutil create -volname "Modbus Studio" -srcfolder dmg_root -ov -format UDZO modbus_studio_mac.dmg
          rm -rf dmg_root

      - name: Upload macOS Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: modbus-studio-macos-zip
          path: modbus_studio_mac.zip
          if-no-files-found: error

      - name: Upload macOS DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: modbus-studio-macos-dmg
          path: modbus_studio_mac.dmg
          if-no-files-found: error

  publish-release:
    name: Publish Draft Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - name: Set Release Version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.tag_name }}" >> $GITHUB_ENV
          else
            echo "RELEASE_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare Release Assets
        run: |
          mkdir -p assets
          cp release-artifacts/modbus-studio-windows/modbus_studio_windows.zip assets/
          cp release-artifacts/modbus-studio-macos-zip/modbus_studio_mac.zip assets/
          cp release-artifacts/modbus-studio-macos-dmg/modbus_studio_mac.dmg assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            assets/modbus_studio_windows.zip
            assets/modbus_studio_mac.zip
            assets/modbus_studio_mac.dmg
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Modbus Studio ${{ env.RELEASE_VERSION }}
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
